<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>LINKA</title>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#080a0c">
  <style>
    :root {
      --bg: #080a0c;
      --panel: #11161a;
      --panel-2: #151c21;
      --line: rgba(255, 255, 255, 0.08);
      --text: #eef4f2;
      --muted: #7f918b;
      --accent: #00d98b;
      --accent-soft: rgba(0, 217, 139, 0.14);
      --warn: #ff426f;
      --warn-soft: rgba(255, 66, 111, 0.14);
      --scroll: #75a7ff;
      --scroll-soft: rgba(117, 167, 255, 0.13);
      --radius: 8px;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: var(--bg);
      color: var(--text);
      position: fixed;
      inset: 0;
    }

    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .app {
      width: 100%;
      height: var(--app-height, 100dvh);
      display: grid;
      grid-template-rows: 52px 1fr;
      overflow: hidden;
      isolation: isolate;
      background:
        linear-gradient(90deg, rgba(0, 217, 139, 0.06), transparent 28%),
        linear-gradient(270deg, rgba(117, 167, 255, 0.06), transparent 32%),
        var(--bg);
    }

    .app.keyboard-open {
      grid-template-rows: 52px auto minmax(0, 1fr);
    }

    .statusbar {
      position: relative;
      grid-row: 1;
      z-index: 5;
      min-height: 52px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      background: #080a0c;
    }

    .statusbar,
    .keyboard-tools {
      flex-shrink: 0;
    }

    .brand {
      display: none;
      align-items: center;
      min-width: 0;
      gap: 9px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .brand-mark {
      width: 16px;
      height: 16px;
      border: 2px solid var(--accent);
      border-radius: 5px;
      box-shadow: 0 0 18px rgba(0, 217, 139, 0.35);
    }

    .status {
      position: fixed;
      left: -9999px;
      top: auto;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 112px;
      justify-content: flex-end;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }

    .status[data-state="connecting"] .status-dot {
      background: #f0bf4f;
    }

    .status[data-state="connected"] {
      color: var(--accent);
    }

    .status[data-state="connected"] .status-dot {
      background: var(--accent);
      box-shadow: 0 0 16px rgba(0, 217, 139, 0.6);
    }

    .status[data-state="disconnected"] {
      color: var(--warn);
    }

    .status[data-state="disconnected"] .status-dot {
      background: var(--warn);
    }

    .keyboard-button,
    .key-button,
    .mute-button,
    .session-button,
    .fullscreen-button {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      touch-action: manipulation;
    }

    .primary-controls {
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .top-button,
    .session-button,
    .fullscreen-button {
      width: 100%;
      min-width: 0;
    }

    .session-button {
      padding: 0 10px;
      color: #ffb1c4;
    }

    .fullscreen-button {
      display: grid;
      place-items: center;
      padding: 0;
    }

    .fullscreen-button svg {
      width: 18px;
      height: 18px;
      pointer-events: none;
    }

    .key-button.active {
      border-color: var(--accent);
      background: rgba(0, 217, 139, 0.18);
      color: var(--accent);
    }

    .icon-key {
      display: grid;
      place-items: center;
      padding: 0;
    }

    .icon-key img {
      width: 24px;
      height: 24px;
      display: block;
      pointer-events: none;
    }

    .keyboard-tools {
      position: relative;
      grid-row: 2;
      z-index: 900;
      display: none;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(8, 10, 12, 0.94);
    }

    .keyboard-tools.visible {
      display: grid;
    }

    .keyboard-input {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 1px;
      height: 1px;
      opacity: 0.01;
      border: 0;
      padding: 0;
      color: transparent;
      background: transparent;
      pointer-events: none;
      user-select: text;
      touch-action: auto;
    }

    .fatal-error {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 1000;
      display: none;
      padding: 12px;
      border: 1px solid rgba(255, 66, 111, 0.65);
      border-radius: 8px;
      background: #211016;
      color: #ffdce5;
      font-size: 13px;
      line-height: 1.35;
      user-select: text;
      touch-action: auto;
    }

    .fatal-error.visible {
      display: block;
    }

    .controller {
      grid-row: 2;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(86px, 20vw) minmax(220px, 1fr) minmax(86px, 18vw);
      grid-template-rows: minmax(96px, 30%) 1fr minmax(76px, 24%);
      gap: 8px;
      padding: 8px;
    }

    .connect-panel {
      grid-row: 2;
      display: none;
      align-content: center;
      justify-items: center;
      gap: 14px;
      padding: 24px 18px;
      text-align: center;
    }

    .app.pairing-mode .connect-panel {
      display: grid;
    }

    .app.pairing-mode .controller,
    .app.pairing-mode .keyboard-tools,
    .app.pairing-mode .bridge-panel {
      display: none;
    }

    .connect-card {
      width: min(100%, 420px);
      padding: 20px 18px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(17, 22, 26, 0.96), rgba(8, 10, 12, 0.96));
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .connect-card h1 {
      margin: 0 0 10px;
      font-size: 22px;
      line-height: 1.05;
    }

    .connect-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .connect-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .connect-action {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .connect-action.warn {
      color: #ffb1c4;
      border-color: rgba(255, 66, 111, 0.35);
      background: rgba(255, 66, 111, 0.1);
    }

    .app.bridge-open {
      grid-template-rows: 52px minmax(0, 1fr);
    }

    .app.bridge-open .controller,
    .app.bridge-open .keyboard-tools {
      display: none;
    }

    .bridge-panel {
      grid-row: 2;
      min-height: 0;
      display: none;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 10px;
      padding: 10px;
      background: rgba(8, 10, 12, 0.66);
      touch-action: auto;
    }

    .app.bridge-open .bridge-panel {
      display: grid;
    }

    .bridge-header {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }

    .bridge-title {
      min-width: 0;
    }

    .bridge-title strong {
      display: block;
      font-size: 20px;
      line-height: 1.1;
    }

    .bridge-title span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .bridge-back,
    .bridge-capture,
    .bridge-clear,
    .bridge-send,
    .bridge-upload,
    .bridge-action {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      touch-action: manipulation;
    }

    .bridge-header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bridge-header-actions {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .bridge-action-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .bridge-back,
    .bridge-capture,
    .bridge-clear {
      padding: 0 12px;
    }

    .bridge-capture {
      border-color: rgba(117, 167, 255, 0.34);
      color: #9fc0ff;
    }

    .bridge-capture:disabled {
      opacity: 0.55;
    }

    .bridge-monitors {
      display: none;
    }

    .bridge-monitor {
      font-size: 9px;
      font-weight: 700;
      color: #9fc0ff;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      user-select: none;
      padding: 0;
      border: 0;
      background: transparent;
      font-family: inherit;
      line-height: 1;
    }

    .bridge-monitor.active {
      color: var(--accent);
    }

    .bridge-monitor.dimmed {
      color: rgba(159, 192, 255, 0.25);
    }

    .bridge-send {
      min-width: 74px;
      border-color: rgba(0, 217, 139, 0.36);
      background: rgba(0, 217, 139, 0.15);
      color: var(--accent);
    }

    .bridge-feed {
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding-right: 2px;
      touch-action: pan-y;
      -webkit-overflow-scrolling: touch;
    }

    .bridge-empty {
      margin: auto;
      max-width: 260px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      text-align: center;
    }

    .bridge-item {
      width: min(100%, 720px);
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .bridge-item.from-phone {
      border-color: rgba(0, 217, 139, 0.18);
    }

    .bridge-item.from-pc {
      border-color: rgba(117, 167, 255, 0.2);
    }

    .bridge-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .bridge-text {
      margin: 0 0 10px;
      color: var(--text);
      font-size: 15px;
      line-height: 1.42;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      user-select: text;
      touch-action: auto;
    }

    .bridge-image {
      display: block;
      width: 100%;
      max-height: 48vh;
      margin-bottom: 10px;
      border-radius: 6px;
      object-fit: contain;
      background: rgba(0, 0, 0, 0.28);
      touch-action: auto;
    }

    .bridge-action {
      padding: 0 12px;
      color: var(--muted);
    }

    .bridge-feed,
    .bridge-feed * {
      touch-action: pan-y;
    }

    .bridge-feed button {
      touch-action: manipulation;
    }

    .bridge-composer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .bridge-input {
      min-width: 0;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 11px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-size: 15px;
      user-select: text;
      touch-action: auto;
    }

    .bridge-input::placeholder {
      color: rgba(127, 145, 139, 0.75);
    }

    .bridge-upload {
      grid-column: 1 / -1;
      color: var(--muted);
    }

    .bridge-file {
      display: none;
    }

    .app.keyboard-open .controller {
      grid-row: 3;
    }

    .zone {
      min-width: 0;
      min-height: 0;
    }

    .zone {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      transition: border-color 80ms linear, background 80ms linear, transform 80ms linear;
    }

    .zone.active {
      transform: scale(0.995);
    }

    .zone-title {
      position: absolute;
      top: 10px;
      left: 10px;
      color: rgba(238, 244, 242, 0.52);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .zone-icon {
      width: 30px;
      height: 30px;
      color: rgba(238, 244, 242, 0.24);
      pointer-events: none;
    }

    .drag-zone {
      grid-column: 1;
      grid-row: 1 / 4;
      background: linear-gradient(90deg, var(--accent-soft), rgba(17, 22, 26, 0.96));
    }

    .drag-zone.active {
      border-color: var(--accent);
      background: linear-gradient(90deg, rgba(0, 217, 139, 0.28), rgba(17, 22, 26, 0.96));
    }

    .trackpad-zone {
      grid-column: 2;
      grid-row: 1 / 4;
      background:
        radial-gradient(circle at center, rgba(0, 217, 139, 0.08), transparent 42%),
        linear-gradient(135deg, #12191d, #090d10);
    }

    .trackpad-zone::before {
      content: "";
      position: absolute;
      width: min(42vw, 250px);
      aspect-ratio: 1;
      border: 1px solid rgba(0, 217, 139, 0.18);
      border-radius: 50%;
      opacity: 0.55;
      pointer-events: none;
    }

    .trackpad-zone.active {
      border-color: rgba(0, 217, 139, 0.72);
      background:
        radial-gradient(circle at center, rgba(0, 217, 139, 0.16), transparent 44%),
        linear-gradient(135deg, #12191d, #090d10);
    }

    .cursor-dot {
      position: absolute;
      width: 9px;
      height: 9px;
      margin: -4px 0 0 -4px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 18px rgba(0, 217, 139, 0.6);
      opacity: 0;
      pointer-events: none;
      transform: translate3d(0, 0, 0);
    }

    .trackpad-zone.active .cursor-dot {
      opacity: 1;
    }

    .volume-zone {
      grid-column: 3;
      grid-row: 1;
      display: grid;
      grid-template-rows: 16px minmax(0, 1fr);
      align-items: stretch;
      justify-content: stretch;
      padding: 4px 0 0;
      background: linear-gradient(270deg, rgba(0, 217, 139, 0.12), rgba(17, 22, 26, 0.96));
      touch-action: none;
    }

    .volume-zone .zone-title {
      position: static;
      align-self: center;
      padding-left: 12px;
      line-height: 1;
    }

    .volume-slider {
      position: relative;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      border-radius: 0;
      background: linear-gradient(270deg, rgba(77, 198, 151, 0.10), rgba(17, 22, 26, 0.96));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.055);
      overflow: hidden;
      touch-action: none;
    }

    .volume-slider::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(238, 244, 242, 0.07) 0,
          rgba(238, 244, 242, 0.07) 1px,
          transparent 1px,
          transparent 22px
        );
      opacity: 0.32;
      pointer-events: none;
    }

    .volume-slider::after {
      content: none;
    }

    .volume-value {
      position: fixed;
      left: -9999px;
      top: auto;
    }

    .volume-zone.active {
      border-color: var(--accent);
      background: linear-gradient(270deg, rgba(0, 217, 139, 0.24), rgba(17, 22, 26, 0.96));
    }

    .scroll-zone {
      grid-column: 3;
      grid-row: 2;
      background: linear-gradient(270deg, var(--scroll-soft), rgba(17, 22, 26, 0.96));
    }

    .scroll-zone.active {
      border-color: var(--scroll);
      background: linear-gradient(270deg, rgba(117, 167, 255, 0.28), rgba(17, 22, 26, 0.96));
    }

    .right-zone {
      grid-column: 3;
      grid-row: 3;
      background: linear-gradient(270deg, var(--warn-soft), rgba(17, 22, 26, 0.96));
    }

    .right-zone.active {
      border-color: var(--warn);
      background: linear-gradient(270deg, rgba(255, 66, 111, 0.24), rgba(17, 22, 26, 0.96));
    }

    @media (orientation: portrait), (max-aspect-ratio: 3 / 4) {
      .app {
        grid-template-rows: 52px auto minmax(0, 1fr);
      }

      .controller {
        grid-row: 3;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) clamp(32px, 10vw, 44px);
        grid-template-rows: 54px minmax(0, 1fr) 64px;
        grid-template-areas:
          "volume volume volume"
          "trackpad trackpad scroll"
          "hold right right";
        gap: 8px;
        height: 100%;
        padding: 8px 10px 10px;
      }

      .trackpad-zone {
        grid-column: auto;
        grid-row: auto;
        grid-area: trackpad;
      }

      .drag-zone {
        grid-column: auto;
        grid-row: auto;
        grid-area: hold;
      }

      .volume-zone {
        grid-column: auto;
        grid-row: auto;
        grid-area: volume;
        grid-template-rows: 16px minmax(0, 1fr);
        background: linear-gradient(270deg, rgba(77, 198, 151, 0.10), rgba(17, 22, 26, 0.96));
        border-color: var(--line);
      }

      .volume-zone.active {
        background: linear-gradient(270deg, rgba(77, 198, 151, 0.16), rgba(17, 22, 26, 0.96));
        border-color: rgba(77, 198, 151, 0.24);
      }

      .volume-zone.active .volume-slider {
        background: rgba(77, 198, 151, 0.10);
        box-shadow: inset 0 1px 0 rgba(77, 198, 151, 0.14);
      }

      .volume-slider {
        width: 100%;
        min-width: 0;
        height: 100%;
        min-height: 0;
        border-radius: 0;
        background: rgba(255, 255, 255, 0.025);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
        overflow: hidden;
      }

      .volume-slider::before {
        background:
          repeating-linear-gradient(
            90deg,
            rgba(238, 244, 242, 0.08) 0,
            rgba(238, 244, 242, 0.08) 1px,
            transparent 1px,
            transparent 22px
          );
        opacity: 0.28;
      }
    }

    @media (orientation: portrait), (max-aspect-ratio: 3 / 4) {
      .volume-zone .volume-slider {
        width: 100%;
        min-width: 0;
      }

      .volume-zone .zone-title {
        display: block;
      }

      .scroll-zone {
        grid-column: auto;
        grid-row: auto;
        grid-area: scroll;
        min-width: 0;
      }

      .right-zone {
        grid-column: auto;
        grid-row: auto;
        grid-area: right;
      }

      .scroll-zone .zone-title {
        writing-mode: vertical-rl;
        transform: rotate(180deg);
      }

      .right-zone .zone-title,
      .drag-zone .zone-title {
        writing-mode: horizontal-tb;
        transform: none;
      }

      .zone-icon {
        width: 24px;
        height: 24px;
      }
    }

    @media (orientation: landscape) and (min-aspect-ratio: 4 / 3) {
      .app.keyboard-open {
        grid-template-rows: 52px minmax(0, 1fr);
      }

      .keyboard-tools.visible {
        display: none;
      }

      .app.keyboard-open .controller {
        grid-row: 2;
      }
    }

    @media (orientation: portrait), (max-aspect-ratio: 3 / 4) {
      .app.is-fullscreen {
        grid-template-rows: 44px auto minmax(0, 1fr);
      }

      .app.is-fullscreen .statusbar {
        min-height: 44px;
        padding: 5px 8px;
        grid-template-columns: minmax(0, 1fr) 38px;
      }

      .app.is-fullscreen .keyboard-button,
      .app.is-fullscreen .key-button,
      .app.is-fullscreen .mute-button,
      .app.is-fullscreen .fullscreen-button {
        height: 32px;
        font-size: 10px;
      }

      .app.is-fullscreen .primary-controls {
        gap: 6px;
      }

      .app.is-fullscreen .controller {
        grid-template-rows: 46px minmax(0, 1fr) 46px;
        gap: 4px;
        padding: 4px 7px 5px;
      }

      .app.is-fullscreen .volume-slider {

      .app.is-fullscreen.keyboard-open .keyboard-tools {

    @media (max-width: 430px) and (orientation: portrait), (max-width: 430px) and (max-aspect-ratio: 3 / 4) {

        padding-bottom: 6px;
      }
    }
  </style>

<body>

        </svg>

    <section id="bridgePanel" class="bridge-panel" aria-label="Bridge transfer panel" aria-hidden="true">

  </main>
  <noscript><div class="fatal-error visible">JavaScript is disabled. LINKA needs JavaScript to run.</div></noscript>
  <div id="fatalError" class="fatal-error" role="alert"></div>

  <script>
    const fatalErrorEl = document.getElementById('fatalError');
    const appEl = document.querySelector('.app');
    function showClientError(message) {
      if (!fatalErrorEl) return;
      fatalErrorEl.textContent = message;
      fatalErrorEl.classList.add('visible');
    }

    function clearClientError() {
      if (!fatalErrorEl) return;
      fatalErrorEl.textContent = '';
      fatalErrorEl.classList.remove('visible');
    }

    window.addEventListener('error', (event) => {
      showClientError(`LINKA client error: ${event.message || 'unknown error'}`);
    });

    window.addEventListener('unhandledrejection', (event) => {
      showClientError(`LINKA client promise error: ${event.reason?.message || event.reason || 'unknown error'}`);
    });

    const statusEl = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const keyboardBtn = document.getElementById('keyboardBtn');
    const forgetBtn = document.getElementById('forgetBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const keyboardTools = document.getElementById('keyboardTools');
    const keyboardInput = document.getElementById('keyboardInput');
    const ctrlBtn = document.getElementById('ctrlBtn');
    const connectPanel = document.getElementById('connectPanel');
    const connectTitle = document.getElementById('connectTitle');
    const connectMessage = document.getElementById('connectMessage');
    const retryConnectBtn = document.getElementById('retryConnectBtn');
    const forgetConnectBtn = document.getElementById('forgetConnectBtn');
    const bridgeBtn = document.getElementById('bridgeBtn');
    const bridgePanel = document.getElementById('bridgePanel');
    const bridgeBackBtn = document.getElementById('bridgeBackBtn');
    const bridgeCaptureBtn = document.getElementById('bridgeCaptureBtn');
    const bridgeClearBtn = document.getElementById('bridgeClearBtn');
    const bridgeFeed = document.getElementById('bridgeFeed');
    const bridgeForm = document.getElementById('bridgeForm');
    const bridgeInput = document.getElementById('bridgeInput');
    const bridgeUploadBtn = document.getElementById('bridgeUploadBtn');
    const bridgeFileInput = document.getElementById('bridgeFileInput');
    const bridgeMonitor1 = document.getElementById('bridgeMonitor1');
    const bridgeMonitor2 = document.getElementById('bridgeMonitor2');
    const dragZone = document.getElementById('dragZone');
    const trackpadZone = document.getElementById('trackpadZone');
    const volumeZone = document.getElementById('volumeZone');
    const volumeSlider = document.getElementById('volumeSlider');
    const volumeValue = document.getElementById('volumeValue');
    const muteBtn = document.getElementById('muteBtn');
    const scrollZone = document.getElementById('scrollZone');
    const rightZone = document.getElementById('rightZone');
    const cursorDot = document.getElementById('cursorDot');

    const SENSITIVITY = 1.45;
    const SCROLL_SENSITIVITY = 0.65;
    const CURSOR_DOT_OFFSET = 72;
    const CURSOR_DOT_PADDING = 8;
    const PINCH_ZOOM_THRESHOLD = 18;
    const PINCH_MAX_STEPS_PER_MOVE = 3;
    const TAP_MAX_MS = 220;
    const TAP_MOVE_TOLERANCE = 7;
    const MAX_BRIDGE_FILE_BYTES = 5 * 1024 * 1024;
    const MOBILE_SESSION_STORAGE_KEY = 'linka.mobile-session.v1';

    let socket;
    let reconnectTimer = 0;
    let reconnectDelay = 650;
    let reconnectAttempt = 0;
    let isConnected = false;
    let isAuthenticated = false;
    let lastPongReceived = Date.now();
    let heartbeatInterval = null;
    let lastServerHello = null;
    let keyboardOpen = false;
    let ctrlArmed = false;
    let shortcutModifier = 'ctrl';
    let bridgeOpen = false;
    let bridgeCapturing = false;
    let bridgeMessages = [];
    let selectedDisplayId = null;
    let pendingPairingParams = readPairingParamsFromUrl();
    let manualDisconnect = false;

    const bridgeSource = window.matchMedia?.('(pointer: coarse)').matches ? 'phone' : 'pc';

    function setPairingMode(active) {
      appEl.classList.toggle('pairing-mode', Boolean(active));
      connectPanel.hidden = !active;
    }

    function setConnectScreen(title, message) {
      connectTitle.textContent = title;
      connectMessage.textContent = message;
    }

    function parseStoredSession(rawValue) {
      if (!rawValue) return null;

      try {
        const parsed = JSON.parse(rawValue);
        if (
          !parsed
          || typeof parsed.desktopOrigin !== 'string'
          || typeof parsed.sessionId !== 'string'
          || typeof parsed.reconnectToken !== 'string'
        ) {
          return null;
        }

        return {
          desktopOrigin: parsed.desktopOrigin,
          host: typeof parsed.host === 'string' ? parsed.host : '',
          port: typeof parsed.port === 'string' ? parsed.port : '',
          sessionId: parsed.sessionId,
          reconnectToken: parsed.reconnectToken,
        };
      } catch (_error) {
        return null;
      }
    }

    function readStoredSession() {
      return parseStoredSession(window.localStorage.getItem(MOBILE_SESSION_STORAGE_KEY));
    }

    function persistSession(session) {
      if (!session) return;

      const origin = new URL(session.desktopOrigin);
      window.localStorage.setItem(MOBILE_SESSION_STORAGE_KEY, JSON.stringify({
        desktopOrigin: origin.origin,
        host: origin.hostname,
        port: origin.port || (origin.protocol === 'https:' ? '443' : '80'),
        sessionId: session.sessionId,
        reconnectToken: session.reconnectToken,
      }));
    }

    function clearStoredSession() {
      window.localStorage.removeItem(MOBILE_SESSION_STORAGE_KEY);
    }

    function readPairingParamsFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('sessionId');
      const pairingToken = params.get('pairingToken');
      if (!sessionId || !pairingToken) return null;
      return { sessionId, pairingToken };
    }

    function clearPairingParamsFromUrl() {
      const url = new URL(window.location.href);
      url.searchParams.delete('sessionId');
      url.searchParams.delete('pairingToken');
      const next = `${url.pathname}${url.search}${url.hash}`;
      window.history.replaceState({}, '', next);
      pendingPairingParams = null;
    }

    function getStoredSessionCandidate() {
      const stored = readStoredSession();
      if (!stored) return null;

      return {
        mode: 'reconnect',
        desktopOrigin: stored.desktopOrigin,
        sessionId: stored.sessionId,
        token: stored.reconnectToken,
      };
    }

    function getAuthCandidate() {
      if (pendingPairingParams) {
        return {
          mode: 'pair',
          desktopOrigin: window.location.origin,
          sessionId: pendingPairingParams.sessionId,
          token: pendingPairingParams.pairingToken,
        };
      }

      return getStoredSessionCandidate();
    }

    function buildSocketUrl(origin) {
      const url = new URL(origin);
      url.protocol = url.protocol === 'https:' ? 'wss:' : 'ws:';
      url.pathname = '/';
      url.search = '';
      url.hash = '';
      return url.toString();
    }

    function applyAuthenticatedSession(origin, sessionId, reconnectToken) {
      persistSession({
        desktopOrigin: origin,
        sessionId,
        reconnectToken,
      });
      clearPairingParamsFromUrl();
      forgetBtn.hidden = false;
    }

    function forgetCurrentDevice(options = {}) {
      manualDisconnect = Boolean(options.manual);
      clearTimeout(reconnectTimer);
      clearStoredSession();
      clearPairingParamsFromUrl();
      isConnected = false;
      isAuthenticated = false;
      if (heartbeatInterval) clearInterval(heartbeatInterval);
      if (socket) {
        socket.onclose = null;
        socket.onerror = null;
        socket.onmessage = null;
        socket.onopen = null;
        if (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING) {
          socket.close();
        }
        socket = null;
      }
      releaseWakeLock();
      setStatus('disconnected', 'Scan to Connect');
      setPairingMode(true);
      setConnectScreen('Pair with Linka', 'Scan the QR code from the desktop app to pair this device again.');
    }

    function handleSessionInvalidation(message) {
      forgetCurrentDevice({ manual: false });
      showClientError(message);
    }

    function applyServerInputState(state) {
      if (!state || !isAuthenticated) return;

      updateShortcutModifierUi(state.inputBackend);
      if (!state.nativeInputReady) {
        if (state.permissionMissing) {
          setStatus('disconnected', 'Permission Needed');
          showClientError('macOS Accessibility Permission is missing! Enable it in System Settings > Privacy & Security > Accessibility for the mouse to work.');
        } else {
          setStatus('connected', 'Test mode');
        }
        return;
      }

      setStatus('connected', 'Connected');
      clearClientError();
    }

    function syncViewportHeight() {
      const height = window.visualViewport?.height || window.innerHeight;
      document.documentElement.style.setProperty('--app-height', `${Math.round(height)}px`);
    }

    function setStatus(state, label) {
      statusEl.dataset.state = state;
      statusText.textContent = label;
    }

    function connect() {
      const authCandidate = getAuthCandidate();
      if (!authCandidate) {
        setStatus('disconnected', 'Scan to Connect');
        setPairingMode(true);
        setConnectScreen('Pair with Linka', 'Scan the QR code from the Linka desktop app to connect this phone.');
        return;
      }

      clearTimeout(reconnectTimer);
      if (socket) {
        socket.onclose = null;
        socket.onerror = null;
        socket.onmessage = null;
        socket.onopen = null;
        if (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING) {
          socket.close();
        }
      }
      reconnectAttempt++;
      const statusLabel = reconnectAttempt > 1
        ? `Reconnecting ${reconnectAttempt}`
        : 'Connecting';
      setStatus('connecting', statusLabel);
      setPairingMode(true);
      setConnectScreen(
        authCandidate.mode === 'pair' ? 'Pairing with Linka' : 'Restoring Linka Session',
        authCandidate.mode === 'pair'
          ? 'Authorizing this browser with the active desktop session.'
          : 'Trying to reconnect to the last paired desktop session.',
      );
      manualDisconnect = false;
      socket = new WebSocket(buildSocketUrl(authCandidate.desktopOrigin));

      socket.onopen = () => {
        isConnected = false;
        isAuthenticated = false;
        lastPongReceived = Date.now();
        clearClientError();
        setStatus('connecting', 'Authorizing');

        if (heartbeatInterval) clearInterval(heartbeatInterval);
        heartbeatInterval = setInterval(() => {
          if (!socket || socket.readyState !== WebSocket.OPEN) return;
          
          if (Date.now() - lastPongReceived > 6000) {
            console.warn('[ws] Heartbeat timeout, forcing reconnect');
            socket.onclose = null;
            socket.close();
            connect();
          } else {
            send({ type: 'ping' });
          }
        }, 3000);

        socket.send(JSON.stringify({
          type: 'auth',
          mode: authCandidate.mode,
          sessionId: authCandidate.sessionId,
          token: authCandidate.token,
        }));
      };

      socket.onclose = () => {
        isConnected = false;
        isAuthenticated = false;
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        releaseWakeLock();
        if (manualDisconnect || !getAuthCandidate()) {
          return;
        }
        setPairingMode(true);
        setConnectScreen('Reconnecting to Linka', `Trying again in ${Math.round(reconnectDelay / 1000)}s.`);
        setStatus('disconnected', `Offline · Retry in ${Math.round(reconnectDelay / 1000)}s`);
        reconnectTimer = window.setTimeout(connect, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 1.6, 5000);
      };

      socket.onerror = (event) => {
        socket.close();
      };

      socket.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'hello') {
            lastServerHello = data;
            applyServerInputState(data);
          } else if (data.type === 'auth_ok') {
            isConnected = true;
            isAuthenticated = true;
            reconnectDelay = 650;
            reconnectAttempt = 0;
            setPairingMode(false);
            setStatus('connected', 'Connected');
            clearClientError();
            requestWakeLock();
            applyAuthenticatedSession(authCandidate.desktopOrigin, data.sessionId, data.reconnectToken);
            applyServerInputState(lastServerHello);
            if (bridgeOpen) {
              requestBridgeSync();
            }
          } else if (data.type === 'auth_error') {
            const reason = data.reason || 'unknown';
            if (reason === 'session_changed' || reason === 'invalid_reconnect' || reason === 'invalid_pairing') {
              handleSessionInvalidation('Desktop session changed or pairing expired. Scan the QR code again.');
            } else if (reason === 'auth_required') {
              handleSessionInvalidation('Authentication is required. Scan the QR code again.');
            } else {
              showClientError(`Authentication failed: ${reason}`);
            }
            socket.close();
          } else if (data.event === 'volume_state') {
            if (data.payload && typeof data.payload.volume === 'number') {
              lastVolumeSent = data.payload.volume;
              renderVolume(lastVolumeSent);
            }
          } else if (data.event === 'system_state') {
            updateShortcutModifierUi(data.payload?.inputBackend);
            if (data.payload && !data.payload.nativeInputReady) {
              if (data.payload.permissionMissing) {
                setStatus('disconnected', 'Permission Needed');
                showClientError('macOS Accessibility Permission is missing! Enable it in System Settings > Privacy & Security > Accessibility for the mouse to work.');
              } else {
                setStatus('connected', 'Input offline');
              }
            } else if (data.payload && data.payload.nativeInputReady) {
              setStatus('connected', 'Connected');
              clearClientError();
            }
          } else if (data.event === 'session_reset') {
            handleSessionInvalidation(data.payload?.message || 'Pairing was reset on the desktop app.');
            socket.close();
          } else if (data.type === 'pong') {
            lastPongReceived = Date.now();
          } else if (data.event) {
            handleBridgeSocketMessage(data);
          }
        } catch (_error) {
          // Ignore non-control server messages.
        }
      };
    }

    function send(data) {
      if (isConnected && socket && socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify(data));
        return true;
      }
      return false;
    }

    function createBridgeId() {
      return window.crypto?.randomUUID?.() || `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function formatBridgeSource(source) {
      return source === 'pc' ? 'PC' : 'Phone';
    }

    function formatBridgeTime(timestamp) {
      const date = new Date(Number(timestamp) || Date.now());
      return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function normalizeBridgeImageSource(content) {
      if (content.startsWith('data:image/')) return content;
      return `data:image/png;base64,${content}`;
    }

    function renderBridgeMessages() {
      bridgeFeed.replaceChildren();

      if (!bridgeMessages.length) {
        const empty = document.createElement('p');
        empty.className = 'bridge-empty';
        empty.textContent = 'No bridge items yet. Send text or an image to share it across this local session.';
        bridgeFeed.append(empty);
        return;
      }

      for (const message of bridgeMessages) {
        const item = document.createElement('article');
        item.className = `bridge-item from-${message.from === 'pc' ? 'pc' : 'phone'}`;

        const meta = document.createElement('div');
        meta.className = 'bridge-meta';

        const source = document.createElement('span');
        source.textContent = `${formatBridgeSource(message.from)} / ${message.type}`;

        const time = document.createElement('time');
        time.dateTime = new Date(Number(message.timestamp) || Date.now()).toISOString();
        time.textContent = formatBridgeTime(message.timestamp);

        meta.append(source, time);
        item.append(meta);

        if (message.type === 'image') {
          const image = document.createElement('img');
          image.className = 'bridge-image';
          image.src = normalizeBridgeImageSource(message.content);
          image.alt = `Image from ${formatBridgeSource(message.from)}`;
          item.append(image);

          const download = document.createElement('button');
          download.className = 'bridge-action';
          download.type = 'button';
          download.textContent = 'Download';
          download.addEventListener('click', () => downloadBridgeItem(message));
          item.append(download);
        } else if (message.type === 'file') {
          const fileInfo = document.createElement('div');
          fileInfo.className = 'bridge-text';
          fileInfo.style.cssText = 'display:flex;align-items:center;gap:10px;';
          const icon = document.createElement('span');
          icon.textContent = '\u{1F4C4}';
          icon.style.cssText = 'font-size:24px;';
          const details = document.createElement('span');
          details.innerHTML = `<strong>${escapeBridgeHtml(message.filename || 'file')}</strong><br><span style="color:var(--muted);font-size:12px;">${formatBridgeFileSize(message.size)}</span>`;
          fileInfo.append(icon, details);
          item.append(fileInfo);

          const download = document.createElement('button');
          download.className = 'bridge-action';
          download.type = 'button';
          download.textContent = 'Download';
          download.addEventListener('click', () => downloadBridgeItem(message));
          item.append(download);
        } else {
          const text = document.createElement('p');
          text.className = 'bridge-text';
          text.textContent = message.content;
          item.append(text);

          const copy = document.createElement('button');
          copy.className = 'bridge-action';
          copy.type = 'button';
          copy.textContent = 'Copy';
          copy.addEventListener('click', () => copyBridgeText(message.content, copy));
          item.append(copy);
        }

        bridgeFeed.append(item);
      }

      bridgeFeed.scrollTop = bridgeFeed.scrollHeight;
    }

    function copyWithExecCommand(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      textarea.style.top = '-9999px';
      textarea.style.opacity = '0';
      document.body.append(textarea);
      textarea.select();
      const success = document.execCommand('copy');
      textarea.remove();
      return success;
    }

    async function copyBridgeText(text, button) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          const ok = copyWithExecCommand(text);
          if (!ok) throw new Error('Copy command failed.');
        }
        button.textContent = 'Copied';
        window.setTimeout(() => {
          button.textContent = 'Copy';
        }, 1200);
      } catch (error) {
        showClientError(`Copy failed: ${error?.message || error}`);
      }
    }

    function downloadBridgeItem(message) {
      const link = document.createElement('a');
      link.href = message.type === 'image'
        ? normalizeBridgeImageSource(message.content)
        : message.content;
      link.download = message.type === 'file'
        ? (message.filename || 'file')
        : `linka-bridge-${message.id || Date.now()}.png`;
      document.body.append(link);
      link.click();
      link.remove();
    }

    function escapeBridgeHtml(value) {
      return String(value).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
    }

    function formatBridgeFileSize(bytes) {
      if (!bytes || bytes < 1024) return `${bytes || 0} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
    }

    function upsertBridgeMessage(message) {
      if (!message || !message.id) return;
      const existingIndex = bridgeMessages.findIndex((item) => item.id === message.id);
      if (existingIndex >= 0) {
        bridgeMessages.splice(existingIndex, 1, message);
      } else {
        bridgeMessages.push(message);
      }
      bridgeMessages = bridgeMessages.slice(-30);
      renderBridgeMessages();
    }

    function handleBridgeSocketMessage(data) {
      if (data.event === 'bridge_sync') {
        bridgeMessages = Array.isArray(data.payload?.messages) ? data.payload.messages.slice(-30) : [];
        renderBridgeMessages();
      } else if (data.event === 'bridge_message') {
        upsertBridgeMessage(data.payload);
      } else if (data.event === 'bridge_clear') {
        bridgeMessages = [];
        renderBridgeMessages();
      } else if (data.event === 'bridge_capture_complete') {
        setBridgeCapturing(false);
      } else if (data.event === 'bridge_capture_error') {
        setBridgeCapturing(false);
        showClientError(data.payload?.message || 'Screen capture failed.');
      } else if (data.event === 'bridge_monitors') {
        renderMonitorButtons(data.payload?.displays || []);
      }
    }

    function renderMonitorButtons(displays) {
      bridgeMonitor1.style.display = 'none';
      bridgeMonitor2.style.display = 'none';
      if (!displays || displays.length <= 1) return;

      for (let i = 0; i < Math.min(displays.length, 2); i++) {
        const display = displays[i];
        const el = i === 0 ? bridgeMonitor1 : bridgeMonitor2;
        el.textContent = display.label;
        el.dataset.displayId = display.id;
        el.style.display = '';
        el.classList.remove('active', 'dimmed');
      }
    }

    function updateMonitorSelection() {
      if (!selectedDisplayId) {
        bridgeMonitor1.classList.remove('active', 'dimmed');
        bridgeMonitor2.classList.remove('active', 'dimmed');
        return;
      }
      const target1 = bridgeMonitor1.dataset.displayId === selectedDisplayId;
      const target2 = bridgeMonitor2.dataset.displayId === selectedDisplayId;
      bridgeMonitor1.classList.toggle('active', target1);
      bridgeMonitor1.classList.toggle('dimmed', !target1 && bridgeMonitor2.style.display !== 'none');
      bridgeMonitor2.classList.toggle('active', target2);
      bridgeMonitor2.classList.toggle('dimmed', !target2 && bridgeMonitor1.style.display !== 'none');
    }

    bridgeMonitor1.addEventListener('click', () => {
      selectedDisplayId = selectedDisplayId === bridgeMonitor1.dataset.displayId ? null : bridgeMonitor1.dataset.displayId;
      updateMonitorSelection();
    });

    bridgeMonitor2.addEventListener('click', () => {
      selectedDisplayId = selectedDisplayId === bridgeMonitor2.dataset.displayId ? null : bridgeMonitor2.dataset.displayId;
      updateMonitorSelection();
    });

    function requestBridgeSync() {
      send({ event: 'bridge_sync_request' });
    }

    function sendBridgeMessage(type, content, extra = {}) {
      const trimmedContent = type === 'text' ? content.trim() : content;
      if (!trimmedContent) return;

      const payload = {
        id: createBridgeId(),
        type,
        content: trimmedContent,
        from: bridgeSource,
        timestamp: Date.now(),
      };

      if (type === 'file') {
        payload.filename = extra.filename || 'file';
        payload.size = extra.size || 0;
      }

      const sent = send({
        event: 'bridge_message',
        payload,
      });

      if (!sent) {
        showClientError('Bridge is offline. Reconnect before sending.');
      }

      return sent;
    }

    function setBridgeCapturing(active) {
      bridgeCapturing = Boolean(active);
      bridgeCaptureBtn.disabled = bridgeCapturing;
      bridgeCaptureBtn.textContent = bridgeCapturing ? 'Capturing' : 'Capture';
    }

    function setBridgeOpen(open) {
      bridgeOpen = Boolean(open);
      if (bridgeOpen) {
        setKeyboardOpen(false);
      }

      appEl.classList.toggle('bridge-open', bridgeOpen);
      bridgePanel.setAttribute('aria-hidden', bridgeOpen ? 'false' : 'true');
      bridgeBtn.setAttribute('aria-pressed', bridgeOpen ? 'true' : 'false');

      if (bridgeOpen) {
        selectedDisplayId = null;
        bridgeMonitor1.style.display = 'none';
        bridgeMonitor2.style.display = 'none';
        send({ event: 'bridge_monitors_request' });
        requestBridgeSync();
      } else {
        bridgeInput.blur();
      }

      syncViewportHeight();
    }

    function activate(zone, active) {
      zone.classList.toggle('active', active);
    }

    function capturePointer(zone, event) {
      event.preventDefault();
      zone.setPointerCapture(event.pointerId);
      activate(zone, true);
    }

    syncViewportHeight();
    window.addEventListener('resize', syncViewportHeight);
    window.visualViewport?.addEventListener('resize', syncViewportHeight);
    window.visualViewport?.addEventListener('scroll', syncViewportHeight);

    retryConnectBtn.addEventListener('click', () => {
      reconnectDelay = 650;
      reconnectAttempt = 0;
      connect();
    });

    forgetBtn.addEventListener('click', (event) => {
      event.preventDefault();
      forgetCurrentDevice({ manual: true });
    });

    forgetConnectBtn.addEventListener('click', (event) => {
      event.preventDefault();
      forgetCurrentDevice({ manual: true });
    });

    connect();

    function setKeyboardOpen(open) {
      keyboardOpen = Boolean(open);
      appEl.classList.toggle('keyboard-open', keyboardOpen);
      keyboardTools.classList.toggle('visible', keyboardOpen);
      keyboardBtn.setAttribute('aria-pressed', keyboardOpen ? 'true' : 'false');
      keyboardBtn.textContent = keyboardOpen ? 'Close' : 'Keyboard';
      syncViewportHeight();

      if (keyboardOpen) {
        keyboardInput.focus({ preventScroll: true });
      } else {
        setCtrlArmed(false);
        keyboardInput.blur();
      }
    }

    function setCtrlArmed(active) {
      ctrlArmed = Boolean(active);
      ctrlBtn.classList.toggle('active', ctrlArmed);
      ctrlBtn.setAttribute('aria-pressed', ctrlArmed ? 'true' : 'false');
    }

    function updateShortcutModifierUi(inputBackend) {
      const isMac = typeof inputBackend === 'string' && inputBackend.startsWith('macos-');
      shortcutModifier = isMac ? 'command' : 'ctrl';
      ctrlBtn.textContent = isMac ? '⌘' : 'Ctrl';
      ctrlBtn.setAttribute('aria-label', isMac ? 'Command' : 'Control');
      ctrlBtn.title = isMac ? 'Command shortcuts' : 'Control shortcuts';
    }

    function consumeCtrlShortcut(text) {
      if (!ctrlArmed || !text || text.length !== 1) return false;

      const key = text.toLowerCase();
      if (!['z', 'c', 'v'].includes(key)) return false;

      send({ type: 'keytap', key, modifiers: [shortcutModifier] });
      setCtrlArmed(false);
      return true;
    }

    keyboardBtn.addEventListener('click', (event) => {
      event.preventDefault();
      setKeyboardOpen(!keyboardOpen);
    });

    bridgeBtn.addEventListener('click', (event) => {
      event.preventDefault();
      setBridgeOpen(true);
    });

    bridgeBackBtn.addEventListener('click', (event) => {
      event.preventDefault();
      setBridgeOpen(false);
    });

    bridgeClearBtn.addEventListener('click', (event) => {
      event.preventDefault();
      send({ event: 'bridge_clear' });
    });

    bridgeCaptureBtn.addEventListener('click', (event) => {
      event.preventDefault();
      if (bridgeCapturing) return;

      clearClientError();
      setBridgeCapturing(true);
      const request = { event: 'bridge_capture_request' };
      if (selectedDisplayId) {
        request.payload = { displayId: selectedDisplayId };
      }
      if (!send(request)) {
        setBridgeCapturing(false);
        showClientError('Bridge is offline. Reconnect before capturing.');
      }
    });

    bridgeForm.addEventListener('submit', (event) => {
      event.preventDefault();
      if (sendBridgeMessage('text', bridgeInput.value)) {
        bridgeInput.value = '';
      }
      bridgeInput.focus({ preventScroll: true });
    });

    bridgeUploadBtn.addEventListener('click', (event) => {
      event.preventDefault();
      bridgeFileInput.click();
    });

    bridgeFileInput.addEventListener('change', () => {
      const file = bridgeFileInput.files?.[0];
      bridgeFileInput.value = '';
      if (!file) return;

      if (file.size > MAX_BRIDGE_FILE_BYTES) {
        showClientError(`File too large (${(file.size / 1024 / 1024).toFixed(1)}MB). Maximum is 5MB.`);
        return;
      }

      const reader = new FileReader();
      reader.addEventListener('load', () => {
        if (typeof reader.result === 'string') {
          const isImage = file.type.startsWith('image/');
          sendBridgeMessage(isImage ? 'image' : 'file', reader.result, {
            filename: file.name,
            size: file.size,
          });
        }
      });
      reader.addEventListener('error', () => {
        showClientError('File upload failed.');
      });
      reader.readAsDataURL(file);
    });

    function updateFullscreenButton() {
      const isFullscreen = Boolean(document.fullscreenElement);
      appEl.classList.toggle('is-fullscreen', isFullscreen);
      fullscreenBtn.setAttribute('aria-pressed', isFullscreen ? 'true' : 'false');
      fullscreenBtn.title = isFullscreen ? 'Exit full screen' : 'Full screen';
      syncViewportHeight();
      window.requestAnimationFrame(() => renderVolume(lastVolumeSent));
    }

    fullscreenBtn.addEventListener('click', async (event) => {
      event.preventDefault();

      try {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        } else if (document.documentElement.requestFullscreen) {
          await document.documentElement.requestFullscreen();
        }
      } catch (error) {
        showClientError(`Full screen failed: ${error?.message || error}`);
      }
    });

    document.addEventListener('fullscreenchange', updateFullscreenButton);
    updateFullscreenButton();

    keyboardInput.addEventListener('beforeinput', (event) => {
      if (event.inputType === 'insertText' && event.data) {
        if (!consumeCtrlShortcut(event.data)) {
          send({ type: 'type', text: event.data });
        }
        event.preventDefault();
      } else if (event.inputType === 'insertFromPaste' && event.data) {
        if (!consumeCtrlShortcut(event.data)) {
          send({ type: 'type', text: event.data });
        }
        event.preventDefault();
      } else if (event.inputType === 'deleteContentBackward') {
        send({ type: 'keytap', key: 'backspace' });
        event.preventDefault();
      } else if (event.inputType === 'insertLineBreak') {
        send({ type: 'keytap', key: 'enter' });
        event.preventDefault();
      }
      keyboardInput.value = '';
    });

    keyboardInput.addEventListener('input', () => {
      if (keyboardInput.value) {
        if (!consumeCtrlShortcut(keyboardInput.value)) {
          send({ type: 'type', text: keyboardInput.value });
        }
        keyboardInput.value = '';
      }
    });

    document.addEventListener('click', (event) => {
      const modifierButton = event.target.closest('[data-modifier]');
      if (modifierButton) {
        event.preventDefault();
        setCtrlArmed(!ctrlArmed);
        keyboardInput.focus({ preventScroll: true });
        return;
      }

      const button = event.target.closest('[data-key]');
      if (!button) return;
      event.preventDefault();
      send({ type: 'keytap', key: button.dataset.key });
      setCtrlArmed(false);
      if (keyboardOpen) {
        keyboardInput.focus({ preventScroll: true });
      }
    });

    const track = {
      pointers: new Map(),
      primaryId: null,
      startTime: 0,
      startX: 0,
      startY: 0,
      lastX: 0,
      lastY: 0,
      moved: false,
      multiTouch: false,
      pinchDistance: 0,
      pinchActive: false,
      moveFlushTimer: null,
      pendingDx: 0,
      pendingDy: 0,
    };

    const MOVE_FLUSH_INTERVAL = 8;

    function flushPendingMove() {
      if (track.moveFlushTimer) {
        clearTimeout(track.moveFlushTimer);
        track.moveFlushTimer = null;
      }

      if (Math.abs(track.pendingDx) > 0.2 || Math.abs(track.pendingDy) > 0.2) {
        send({ type: 'move', dx: track.pendingDx, dy: track.pendingDy });
      }

      track.pendingDx = 0;
      track.pendingDy = 0;
    }

    function getPinchDistance() {
      if (track.pointers.size < 2) return 0;
      const points = Array.from(track.pointers.values()).slice(0, 2);
      return Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
    }

    function resetPinchGesture() {
      track.pinchDistance = 0;
      track.pinchActive = false;
    }

    function startPinchGesture() {
      track.pinchDistance = getPinchDistance();
      track.pinchActive = track.pinchDistance > 0;
    }

    function handlePinchGesture() {
      if (track.pointers.size < 2) {
        resetPinchGesture();
        return;
      }

      if (!track.pinchActive) {
        startPinchGesture();
        return;
      }

      const distance = getPinchDistance();
      const delta = distance - track.pinchDistance;
      const steps = Math.min(
        PINCH_MAX_STEPS_PER_MOVE,
        Math.floor(Math.abs(delta) / PINCH_ZOOM_THRESHOLD),
      );

      if (steps < 1) return;

      const direction = delta > 0 ? 'in' : 'out';
      for (let i = 0; i < steps; i += 1) {
        send({ type: 'zoom', direction });
      }

      track.moved = true;
      track.pinchDistance += Math.sign(delta) * steps * PINCH_ZOOM_THRESHOLD;
    }

    function positionCursorDot(event) {
      const rect = trackpadZone.getBoundingClientRect();
      const x = Math.max(
        CURSOR_DOT_PADDING,
        Math.min(rect.width - CURSOR_DOT_PADDING, event.clientX - rect.left - CURSOR_DOT_OFFSET),
      );
      const y = Math.max(
        CURSOR_DOT_PADDING,
        Math.min(rect.height - CURSOR_DOT_PADDING, event.clientY - rect.top - CURSOR_DOT_OFFSET),
      );

      cursorDot.style.transform = `translate3d(${x}px, ${y}px, 0)`;
    }

    trackpadZone.addEventListener('pointerdown', (event) => {
      capturePointer(trackpadZone, event);
      track.pointers.set(event.pointerId, { x: event.clientX, y: event.clientY });

      if (track.primaryId === null) {
        track.primaryId = event.pointerId;
        track.startTime = performance.now();
        track.startX = event.clientX;
        track.startY = event.clientY;
        track.lastX = event.clientX;
        track.lastY = event.clientY;
        track.moved = false;
        track.multiTouch = false;
        resetPinchGesture();
      } else {
        track.multiTouch = true;
        startPinchGesture();
      }

      positionCursorDot(event);
    });

    trackpadZone.addEventListener('pointermove', (event) => {
      if (!track.pointers.has(event.pointerId)) return;
      event.preventDefault();
      track.pointers.set(event.pointerId, { x: event.clientX, y: event.clientY });

      if (track.multiTouch) {
        handlePinchGesture();
        return;
      }

      if (event.pointerId !== track.primaryId) return;

      const dx = (event.clientX - track.lastX) * SENSITIVITY;
      const dy = (event.clientY - track.lastY) * SENSITIVITY;
      const totalMove = Math.hypot(event.clientX - track.startX, event.clientY - track.startY);

      if (totalMove > TAP_MOVE_TOLERANCE) {
        track.moved = true;
      }

      track.pendingDx += dx;
      track.pendingDy += dy;

      if (!track.moveFlushTimer) {
        track.moveFlushTimer = setTimeout(flushPendingMove, MOVE_FLUSH_INTERVAL);
      }

      track.lastX = event.clientX;
      track.lastY = event.clientY;
      positionCursorDot(event);
    });

    function endTrackPointer(event) {
      if (!track.pointers.has(event.pointerId)) return;
      event.preventDefault();
      track.pointers.delete(event.pointerId);

      if (track.pointers.size === 0) {
        flushPendingMove();
        const duration = performance.now() - track.startTime;
        if (!track.moved && duration < TAP_MAX_MS) {
          send({ type: 'click', button: track.multiTouch ? 'right' : 'left' });
        }

        track.primaryId = null;
        track.multiTouch = false;
        resetPinchGesture();
        activate(trackpadZone, false);
      } else {
        resetPinchGesture();
        if (track.pointers.size >= 2) {
          startPinchGesture();
        }
      }
    }

    trackpadZone.addEventListener('pointerup', endTrackPointer);
    trackpadZone.addEventListener('pointercancel', endTrackPointer);

    dragZone.addEventListener('pointerdown', (event) => {
      capturePointer(dragZone, event);
      send({ type: 'mousedown', button: 'left' });
    });

    function releaseDrag(event) {
      event.preventDefault();
      activate(dragZone, false);
      send({ type: 'mouseup', button: 'left' });
    }

    dragZone.addEventListener('pointerup', releaseDrag);
    dragZone.addEventListener('pointercancel', releaseDrag);

    let scrollPointerId = null;
    let lastScrollY = 0;

    scrollZone.addEventListener('pointerdown', (event) => {
      capturePointer(scrollZone, event);
      scrollPointerId = event.pointerId;
      lastScrollY = event.clientY;
    });

    scrollZone.addEventListener('pointermove', (event) => {
      if (event.pointerId !== scrollPointerId) return;
      event.preventDefault();
      const dy = (lastScrollY - event.clientY) * SCROLL_SENSITIVITY;
      if (Math.abs(dy) >= 1) {
        send({ type: 'scroll', dy: Math.round(dy) });
        lastScrollY = event.clientY;
      }
    });

    function releaseScroll(event) {
      if (event.pointerId !== scrollPointerId) return;
      event.preventDefault();
      scrollPointerId = null;
      activate(scrollZone, false);
    }

    scrollZone.addEventListener('pointerup', releaseScroll);
    scrollZone.addEventListener('pointercancel', releaseScroll);

    let lastVolumeSent = 0.5;
    function renderVolume(value) {
      const percent = Math.round(value * 100);
      volumeValue.textContent = `${percent}%`;
      volumeSlider.setAttribute('aria-valuenow', String(percent));
    }

    function setVolumeValue(value) {
      const clamped = Math.max(0, Math.min(1, value));
      renderVolume(clamped);

      if (Math.abs(clamped - lastVolumeSent) >= 0.01) {
        send({ type: 'volume', value: clamped });
      }

      lastVolumeSent = clamped;
    }

    function setVolumeFromPointer(event) {
      const rect = volumeSlider.getBoundingClientRect();
      if (!rect.width) return;

      const ratio = (event.clientX - rect.left) / rect.width;
      setVolumeValue(ratio);
    }

    let volumeStartX = 0;
    let volumeStartValue = 0.5;
    let volumeDidDrag = false;

    function adjustVolumeFromPointerDrag(event) {
      const rect = volumeSlider.getBoundingClientRect();
      if (!rect.width) return;

      const deltaRatio = (event.clientX - volumeStartX) / rect.width;
      volumeDidDrag = true;
      setVolumeValue(volumeStartValue + deltaRatio);
    }

    let volumePointerId = null;

    volumeZone.addEventListener('pointerdown', (event) => {
      event.preventDefault();
      volumePointerId = event.pointerId;
      volumeStartX = event.clientX;
      volumeStartValue = lastVolumeSent;
      volumeDidDrag = false;
      volumeZone.setPointerCapture(event.pointerId);
      activate(volumeZone, true);
    });

    volumeZone.addEventListener('pointermove', (event) => {
      if (event.pointerId !== volumePointerId) return;
      event.preventDefault();
      adjustVolumeFromPointerDrag(event);
    });

    function releaseVolume(event) {
      if (event.pointerId !== volumePointerId) return;
      event.preventDefault();
      if (!volumeDidDrag) {
        setVolumeFromPointer(event);
      }
      volumePointerId = null;
      activate(volumeZone, false);
    }

    volumeZone.addEventListener('pointerup', releaseVolume);
    volumeZone.addEventListener('pointercancel', releaseVolume);

    volumeSlider.addEventListener('keydown', (event) => {
      const step = event.shiftKey ? 0.1 : 0.05;
      if (event.key === 'ArrowRight' || event.key === 'ArrowUp') {
        event.preventDefault();
        setVolumeValue(lastVolumeSent + step);
      } else if (event.key === 'ArrowLeft' || event.key === 'ArrowDown') {
        event.preventDefault();
        setVolumeValue(lastVolumeSent - step);
      }
    });

    window.addEventListener('resize', () => renderVolume(lastVolumeSent));
    window.visualViewport?.addEventListener('resize', () => renderVolume(lastVolumeSent));
    renderVolume(lastVolumeSent);

    let lastMuteToggleAt = 0;

    function toggleMute(event) {
      const now = performance.now();
      event.preventDefault();
      event.stopPropagation();

      if (now - lastMuteToggleAt < 350) {
        return;
      }

      lastMuteToggleAt = now;
      send({ type: 'togglemute' });
    }

    muteBtn.addEventListener('pointerdown', (event) => {
      event.preventDefault();
      event.stopPropagation();
    });

    muteBtn.addEventListener('pointerup', toggleMute);

    muteBtn.addEventListener('click', (event) => {
      if (performance.now() - lastMuteToggleAt < 350) {
        event.preventDefault();
        event.stopPropagation();
        return;
      }

      toggleMute(event);
    });

    rightZone.addEventListener('pointerdown', (event) => {
      capturePointer(rightZone, event);
      send({ type: 'click', button: 'right' });
    });

    function releaseRight(event) {
      event.preventDefault();
      activate(rightZone, false);
    }

    rightZone.addEventListener('pointerup', releaseRight);
    rightZone.addEventListener('pointercancel', releaseRight);

    window.addEventListener('contextmenu', (event) => {
      event.preventDefault();
    });

    window.addEventListener('gesturestart', (event) => {
      event.preventDefault();
    });

    let wakeLock = null;

    async function requestWakeLock() {
      if (!('wakeLock' in navigator)) return;
      try {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => {
          wakeLock = null;
        });
      } catch (_error) {
        // Wake Lock not available or denied.
      }
    }

    async function releaseWakeLock() {
      if (wakeLock) {
        try {
          await wakeLock.release();
        } catch (_error) {
          // ignore
        }
        wakeLock = null;
      }
    }

    let hiddenAt = 0;
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') {
        hiddenAt = Date.now();
      } else if (document.visibilityState === 'visible') {
        if (isConnected) {
          requestWakeLock();
        }
        const timeHidden = hiddenAt > 0 ? Date.now() - hiddenAt : 0;
        const socketIsDead = !socket || socket.readyState === WebSocket.CLOSED || socket.readyState === WebSocket.CLOSING;
        
        if (socketIsDead || timeHidden > 3000) {
          console.log(`[ws] Forcing reconnect. Dead: ${socketIsDead}, Time hidden: ${timeHidden}ms`);
          connect();
        }
        hiddenAt = 0;
      }
    });

    window.addEventListener('online', () => {
      if (!socket || socket.readyState === WebSocket.CLOSED || socket.readyState === WebSocket.CLOSING) {
        connect();
      }
    });
  </script>
</body>
</html>
